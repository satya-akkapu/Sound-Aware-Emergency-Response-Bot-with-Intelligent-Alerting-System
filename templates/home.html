<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Safety Bot</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #001f3f, #004d7a, #008793);
      color: #fff;
      text-align: center;
    }

    header {
      background:#0b3954;
      padding: 15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      width:100%;
      top:0;
      z-index: 100;
    }

    nav ul { display:flex; list-style:none; padding:0; margin:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:bold; }
    nav ul li a:hover { color:#ff6e40; }

    .home-container {
      margin: 120px auto 40px;
      width: 600px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .bot-image {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 5px solid #ffdf5d;
      object-fit: contain;
      background:#fff;
    }

    .control-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      border-radius: 10px;
      border:none;
      font-weight:bold;
      background:#ffdf5d;
      cursor:pointer;
      min-width: 160px;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    footer {
      margin-top:40px;
      padding:20px;
      background:#0b3954;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Safety <span>Bot</span></div>
  <nav>
    <ul>
      <li><a href="{{ url_for('logout') }}">Logout</a></li>
      <li><a href="{{ url_for('contact') }}">Contact</a></li>
    </ul>
  </nav>
</header>

<div class="home-container">

  <img src="{{ url_for('static', filename='images/bot1.png') }}" class="bot-image">

  <h2>Emergency Sound Detection</h2>

  <p>
    Safety Bot is monitoring your surroundings for emergency sounds.
    If a distress sound is detected, alerts will be sent to your trusted contacts.
  </p>

  <div class="control-buttons">
    <button id="startBtn">▶ Start Listening</button>
    <button id="stopBtn" disabled>■ Stop Listening</button>
  </div>

  <p id="status">Idle</p>

</div>

<footer>
  <p>© 2025 Safety Bot</p>
</footer>

<!-- ================= JS ================= -->
<script>
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// ================= LOCATION =================
function sendLocation(lat, lon) {
  fetch("/save_location", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ lat: lat, lon: lon })
  });
}

function fetchAndSendLocation() {

  navigator.geolocation.getCurrentPosition(
    function (position) {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracy = position.coords.accuracy; // meters

      console.log("Lat:", lat);
      console.log("Lon:", lon);
      console.log("Accuracy:", accuracy);

      // ✅ Only send if accuracy is good
      if (accuracy <= 50) {
        sendLocation(lat, lon);
        console.log("✅ Accurate location sent");
      } else {
        console.log("⚠ Waiting for better GPS fix...");
      }

    },
    function (error) {
      console.error("Location error:", error.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 20000,
      maximumAge: 0
    }
  );
}

// ================= CONTROLS =================
async function startListening() {

  // First get GPS
  await new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      function (position) {

        fetch("/save_location", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: position.coords.latitude,
            lon: position.coords.longitude
          })
        }).then(() => {
          console.log("✅ Location saved before listening");
          resolve();
        });

      }
    );
  });

  // THEN start listening
  await fetch("/start_listening", { method: "POST" });

  statusEl.innerText = "🎧 Listening...";
}

async function stopListening() {
  await fetch("/stop_listening", { method: "POST" });
  statusEl.innerText = "Idle";
}

startBtn.onclick = startListening;
stopBtn.onclick = stopListening;

// ================= STATUS =================
async function fetchStatus() {
  const res = await fetch("/listener_status");
  const data = await res.json();

  startBtn.disabled = data.running;
  stopBtn.disabled = !data.running;

  if (data.emergency) {
    statusEl.innerText = "🚨 Emergency Detected";
  }
}

// 🔁 Update location every 15 seconds
setInterval(fetchAndSendLocation, 15000);
setInterval(fetchStatus, 1500);
</script>
</body>
</html>
